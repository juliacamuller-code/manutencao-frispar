async function _compressPhoto(d,w,q){w=w||800;q=q||0.6;return new Promise(function(res){var i=new Image();i.onload=function(){var r=Math.min(1,w/i.width);var c=document.createElement('canvas');c.width=Math.round(i.width*r);c.height=Math.round(i.height*r);c.getContext('2d').drawImage(i,0,0,c.width,c.height);res(c.toDataURL('image/jpeg',q));};i.onerror=function(){res(d);};i.src=d;});}
async function compressPhotos(photos){if(!photos||!photos.length)return[];var out=[];for(var i=0;i<photos.length;i++){var p=photos[i];if(p&&p.data&&p.data.length>30000){try{var c=await _compressPhoto(p.data);if(c.length>250000){try{c=await _compressPhoto(c,600,0.5);}catch(_){}}out.push(Object.assign({},p,{data:c}));}catch(e){out.push(p);}}else if(p){out.push(p);}}return out;}

<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useMemo,useCallback} = React;

/* ── USERS & PERMISSIONS ──────────────── */

  },
};
function can(user,perm){if(!user)return false;const p=PERMS[user.role];if(!p)return false;return p[perm];}
// Bidirectional compra<->task link helpers (supports legacy single taskId + new taskIds array)
function compraTaskIds(c){if(!c)return[];if(Array.isArray(c.taskIds))return c.taskIds.filter(Boolean);if(c.taskId)return[c.taskId];return [];}
function comprasForTask(compras,taskId){return compras.filter(c=>compraTaskIds(c).includes(taskId));}
function tasksForCompra(tasks,c){const ids=compraTaskIds(c);return tasks.filter(t=>ids.includes(t.id));}
// Simple hash for passwords (not cryptographic, just obfuscation for low-security internal tool)
function hashPwd(s){let h=0;const str="frispar_"+s;for(let i=0;i<str.length;i++){h=((h<<5)-h)+str.charCodeAt(i);h|=0;}return"h"+Math.abs(h).toString(36);}
function carry(arr){
  var today=getToday(),wknd=isWE(today);
  return (arr||[]).map(function(task){
    if(task.status!=="pending")return task;
    if(task.weekendOnly&&!wknd)return task;
    // Task manually rescheduled to a future date: leave it alone
    if(task.manualSchedule&&task.scheduledDate&&task.scheduledDate>=today)return task;
    var sd=task.scheduledDate;
    if(task.deadline&&daysLeft(task.deadline)<=2&&!task.weekendOnly)sd=today;
    if(sd&&sd<today)sd=today;
    return sd!==task.scheduledDate?Object.assign({},task,{scheduledDate:sd}):task;
  });
}

/* ── UTILS ───────────────────────────── */
const getToday=()=>new Date().toISOString().split("T")[0];
const fmt=d=>{if(!d)return"";const[y,m,dy]=d.split("-");return`${dy}/${m}/${y}`;};
const fmtM=d=>{if(!d)return"";const[y,m]=d.split("-");const ms=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];return`${ms[parseInt(m)-1]}/${y}`;};
const DAYS_S=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
const DAYS_F=["Domingo","Segunda-feira","Terça-feira","Quarta-feira","Quinta-feira","Sexta-feira","Sábado"];
const MONTHS_LABEL=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const dayS=d=>DAYS_S[new Date(d+"T12:00").getDay()];
const dayF=d=>DAYS_F[new Date(d+"T12:00").getDay()];
const isWE=d=>{const w=new Date(d+"T12:00").getDay();return w===0||w===6;};
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const addD=(d,n)=>{const x=new Date(d+"T12:00");x.setDate(x.getDate()+n);return x.toISOString().split("T")[0];};
const addM=(d,n)=>{const x=new Date(d+"T12:00");x.setMonth(x.getMonth()+n);return x.toISOString().split("T")[0];};
const nextOcc=(r,f)=>r==="daily"?addD(f,1):r==="weekly"?addD(f,7):addM(f,1);
const inRange=(d,a,b)=>d>=a&&d<=b;
const nowTime=()=>new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
const daysLeft=dl=>{if(!dl)return 999;return Math.round((new Date(dl+"T12:00")-new Date(getToday()+"T12:00"))/86400000);};
const daysSince=d=>{if(!d)return 0;return Math.round((new Date(getToday()+"T12:00")-new Date(d+"T12:00"))/86400000);};
const getWeekStart=d=>{const x=new Date(d+"T12:00"),s=new Date(x);s.setDate(x.getDate()-(x.getDay()===0?6:x.getDay()-1));return s.toISOString().split("T")[0];};
const getWeekDays=s=>{const d=[];for(let i=0;i<7;i++)d.push(addD(s,i));return d;};
const getWeekRange=d=>{const ws=getWeekStart(d);return[ws,addD(ws,6)];};
const urgSort=arr=>[...arr].sort((a,b)=>{const u={critica:0,alta:1,normal:2};const d=(u[a.urgency]||2)-(u[b.urgency]||2);return d!==0?d:(a.deadline||"9999")>(b.deadline||"9999")?1:-1;});
const fmtR=v=>{if(!v&&v!==0)return"—";return`R$ ${parseFloat(v).toFixed(2).replace(".",",").replace(/\B(?=(\d{3})+(?!\d))/g,".")}`;};
const getCurrentYear=()=>new Date().getFullYear();
const getCurrentMonth=()=>new Date().getMonth()+1;

/* ── DESIGN TOKENS ───────────────────── */

const GL="#f0fdf4"; const GB="#bbf7d0"; const GD="#14532d";

const GR1="#f8fafc"; // gray1
const GR2="#f1f5f9"; // gray2

const B2="#cbd5e1";  // border2

const T2="#475569";  // text mid
const T3="#94a3b8";  // text light

/* ── STATUS CONFIG ───────────────────── */
const SC={
  pendente:{bg:"#fffbeb",bd:"#fde68a",tx:"#92400e",lb:"Pendente"},
  aprovado:{bg:"#f0fdf4",bd:"#bbf7d0",tx:"#14532d",lb:"Aprovado"},

/* ── BASE STYLES ─────────────────────── */
const card={background:SF,border:`1px solid ${B1}`,borderRadius:10,padding:"14px 16px",boxShadow:SHADOW};
const lbl={fontSize:11,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",color:T3,display:"block",marginBottom:5};
const inp={background:SF,border:`1.5px solid ${B1}`,borderRadius:8,color:T1,padding:"10px 13px",width:"100%",outline:"none",fontSize:14,transition:"border-color 0.15s",boxShadow:"inset 0 1px 2px rgba(0,0,0,0.04)"};

/* ── ATOMS ───────────────────────────── */
function SBadge({s}){const c=SC[s]||{bg:GR2,bd:B2,tx:T2,lb:s};return<span style={{display:"inline-flex",alignItems:"center",padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:600,background:c.bg,border:`1px solid ${c.bd}`,color:c.tx,whiteSpace:"nowrap"}}>{c.lb}</span>;}
function UBadge({u}){if(!u||u==="normal")return null;const c=UC[u]||UC.critica;return<span style={{display:"inline-flex",alignItems:"center",padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:600,background:c.bg,border:`1px solid ${c.bd}`,color:c.tx}}>{c.lb}</span>;}
function Pill({c,bg,bd,ch}){return<span style={{display:"inline-flex",alignItems:"center",padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:600,background:bg||GR2,border:`1px solid ${bd||B2}`,color:c||T2,whiteSpace:"nowrap"}}>{ch}</span>;}
function NBadge({n,bg}){if(!n||n<=0)return null;return<span style={{background:bg||Y,color:bg?SF:DK,borderRadius:10,minWidth:18,height:18,fontSize:10,fontWeight:700,display:"inline-flex",alignItems:"center",justifyContent:"center",padding:"0 5px"}}>{n}</span>;}

function SH({label,c,count,right}){

    {right&&<span style={{marginLeft:"auto"}}>{right}</span>}
  </div>;
}

function DLBadge({dl}){
  if(!dl)return null;const d=daysLeft(dl);
  if(d<0)return<Pill c={R} bg={RL} bd={RB} ch={`Vencida ${Math.abs(d)}d`}/>;
  if(d===0)return<Pill c={R} bg={RL} bd={RB} ch="Vence hoje"/>;
  if(d<=2)return<Pill c={R} bg={RL} bd={RB} ch={`${d}d p/vencer`}/>;
  if(d<=5)return<Pill c={YD} bg={YL} bd={YB} ch={`${d}d p/vencer`}/>;
  return<span style={{fontSize:12,color:T3}}>Prazo: {fmt(dl)}</span>;
}
function PendDays({date}){
  if(!date)return null;const d=daysSince(date);
  return<span style={{fontSize:12,color:d>7?R:d>3?YD:T3,fontWeight:d>7?700:400}}>{d===0?"hoje":`${d}d pendente${d>1?"s":""}`}</span>;

/* ── BUTTONS ─────────────────────────── */
const btnBase={border:"none",cursor:"pointer",fontFamily:"'Inter',sans-serif",fontWeight:600,fontSize:13,display:"inline-flex",alignItems:"center",justifyContent:"center",gap:6,borderRadius:8,transition:"all 0.15s"};

function F({label,children,req}){return<div style={{marginBottom:14}}><label style={lbl}>{label}{req&&<span style={{color:R}}> *</span>}</label>{children}</div>;}

  </div>;

/* ── PHOTO PICKER ────────────────────── */
function PhotoPicker({photos,onChange,label}){
  const ref=useRef();
  const MAX=3;
  const add=async e=>{
    const files=Array.from(e.target.files);
    for(const file of files){
      let cnt=0;onChange(p=>{cnt=p.length;return p;});
      // read + compress immediately so heavy phone photos shrink before going into state
      await new Promise(res=>{
        const r=new FileReader();
        r.onload=async ev=>{
          let data=ev.target.result;
          try{if(data.length>30000)data=await _compressPhoto(data);}catch(_){}
          onChange(p=>p.length>=MAX?p:[...p,{data,name:file.name}]);
          res();
        };
        r.onerror=()=>res();
        r.readAsDataURL(file);
      });
    }
    if(ref.current)ref.current.value="";
  };
  const full=photos.length>=MAX;
  return<F label={label||"Fotos"}>
    <Btn onClick={()=>!full&&ref.current.click()} v="light" style={{width:"100%",padding:"10px",borderStyle:"dashed",fontSize:13,opacity:full?0.5:1,cursor:full?"not-allowed":"pointer"}}>{full?`Máximo de ${MAX} fotos atingido`:"+ Adicionar foto"}</Btn>
    <div style={{fontSize:11,color:T3,marginTop:5}}>Até {MAX} fotos · comprimidas automaticamente para economizar espaço</div>
    {photos.length>0&&<div style={{display:"flex",gap:8,marginTop:10,flexWrap:"wrap"}}>{photos.map((p,i)=><div key={i} style={{position:"relative"}}><img src={p.data} alt="" style={{width:68,height:68,objectFit:"cover",borderRadius:8,border:`1px solid ${B1}`}}/><button onClick={()=>onChange(prev=>prev.filter((_,j)=>j!==i))} style={{position:"absolute",top:-5,right:-5,background:R,border:"none",color:"#fff",borderRadius:"50%",width:18,height:18,fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>×</button></div>)}</div>}
    <input ref={ref} type="file" accept="image/*" multiple style={{display:"none"}} onChange={add}/>
  </F>;
}

/* ── DATE RANGE PICKER ───────────────── */
function DateRangePicker({from,to,onChange}){
  const year=getCurrentYear();
  const[mode,setMode]=useState("month"); // month | custom | year
  const[selYear,setSelYear]=useState(year);
  const[selMonth,setSelMonth]=useState(getCurrentMonth());

  const apply=(f,t)=>{onChange(f,t);};

  const applyMonth=()=>{
    const m=String(selMonth).padStart(2,"0");
    const start=`${selYear}-${m}-01`;
    const end=`${selYear}-${m}-31`;
    apply(start,end);
  };
  useEffect(()=>{if(mode==="month")applyMonth();},[selYear,selMonth,mode]);
  useEffect(()=>{if(mode==="year"){apply(`${selYear}-01-01`,`${selYear}-12-31`);}},[selYear,mode]);

  const years=[];for(let y=year;y>=year-4;y--)years.push(y);

  return<div style={{background:SF,border:`1px solid ${B1}`,borderRadius:10,padding:"14px 16px",boxShadow:SHADOW}}>
    <div style={{display:"flex",gap:8,marginBottom:12}}>
      {[["month","Por mês"],["year","Ano inteiro"],["custom","Personalizado"]].map(([m,l])=><button key={m} onClick={()=>setMode(m)} style={{padding:"6px 12px",borderRadius:20,border:`1px solid ${mode===m?Y:B2}`,background:mode===m?YL:SF,color:mode===m?YD:T2,fontWeight:600,fontSize:12,cursor:"pointer"}}>{l}</button>)}
    </div>
    {(mode==="month"||mode==="year")&&<div style={{display:"flex",gap:10}}>
      <select style={{...inp,flex:"0 0 100px"}} value={selYear} onChange={e=>{setSelYear(parseInt(e.target.value));}}>

    </div>}

/* ── TASK CARD ───────────────────────── */
function TC({t,onCheck,onDetail,critical}){
  const u=t.urgency||"normal";
  const isU=critical||u==="critica";
  const bc=isU?R:u==="alta"?Y:t.weekendOnly?"#7c3aed":B1;
  return<div style={{...card,borderLeft:`3px solid ${bc}`,background:isU?RL:SF,borderColor:isU?RB:B1,marginBottom:8}}>
    <div style={{display:"flex",alignItems:"center",gap:12}}>
      <button onClick={onCheck} style={{width:42,height:42,borderRadius:10,border:`2px solid ${bc}`,background:isU?RL:YL,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:700,color:bc}}>✓</button>
      <div style={{flex:1,minWidth:0,cursor:"pointer"}} onClick={onDetail}>
        <div style={{fontSize:14,fontWeight:600,color:isU?R:T1,marginBottom:4,lineHeight:1.3}}>{t.title}</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:"4px 8px",alignItems:"center"}}>
          {isU&&<UBadge u={u==="critica"?"critica":"urgente"}/>}
          {!isU&&u==="alta"&&<UBadge u="alta"/>}
          {t.weekendOnly&&<Pill c="#7c3aed" bg="#f5f3ff" bd="#ddd6fe" ch="Fim semana"/>}
          {t.wasPaused&&<Pill c={YD} bg={YL} bd={YB} ch="⏸ Continuação"/>}
          {t.type==="adhoc"&&<Pill c="#1d4ed8" bg="#eff6ff" bd="#bfdbfe" ch="Avulsa"/>}
          {critical?<DLBadge dl={t.deadline}/>:daysLeft(t.deadline)<=5?<DLBadge dl={t.deadline}/>:null}
          {t.responsible&&<span style={{fontSize:12,color:T3}}>👷 {t.responsible}</span>}
          {t.requester&&<span style={{fontSize:12,color:T3}}>{t.requester}</span>}
        </div>
      </div>
      <button onClick={onDetail} style={{background:"none",border:"none",cursor:"pointer",color:T3,fontSize:20,padding:"4px 6px",flexShrink:0}}>›</button>
    </div>
  </div>;
}

        <div><label style={lbl}>Prazo máximo de execução</label><div style={{fontSize:15,fontWeight:700,color:dl<=2?R:dl<=5?YD:T1}}>{fmt(item.deadline)}</div></div>
        <DLBadge dl={item.deadline}/>
      </div>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {[["Solicitante",item.requester],["Responsável",item.responsible],["Executado por",item.completedBy],["Concluído em",item.completedAt?`${fmt(item.completedAt)} ${item.completedTime||""}`:null]].filter(([,v])=>v).map(([l,v])=><div key={l} style={{background:GR2,borderRadius:8,padding:"10px 12px"}}><label style={lbl}>{l}</label><span style={{fontSize:13,color:T1}}>{v}</span></div>)}
      </div>
      {item.status==="done"&&item.lateDays>0&&<div style={{background:RL,border:`1px solid ${RB}`,borderRadius:8,padding:"10px 14px",display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:16}}>⏰</span><div><div style={{fontSize:13,fontWeight:700,color:R}}>Entregue com {item.lateDays} dia{item.lateDays>1?"s":""} de atraso</div><div style={{fontSize:12,color:T2}}>Prazo era {fmt(item.deadline)}, concluída {fmt(item.completedAt)}</div></div>
      </div>}
      {/* Scheduled date with inline edit */}
      {item.status==="pending"&&<div style={{background:GR2,borderRadius:8,padding:"10px 14px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:editingDate?8:0}}>
          <div><label style={lbl}>Data programada</label>{!editingDate&&<span style={{fontSize:13,color:item.scheduledDate?T1:T3}}>{item.scheduledDate?`${dayS(item.scheduledDate)}, ${fmt(item.scheduledDate)}`:"Não programada"}</span>}</div>
          {!editingDate&&<Btn onClick={()=>setEditingDate(true)} v="light" style={{padding:"5px 10px",fontSize:11}}>Alterar data</Btn>}
        </div>
        {editingDate&&<div>
          <div style={{display:"flex",gap:8,marginBottom:8}}>
            <Inp2 type="date" value={newDate} onChange={e=>setNewDate(e.target.value)} min={today}/>
          </div>
          {item.deadline&&newDate>item.deadline&&<div style={{fontSize:12,color:R,fontWeight:600,marginBottom:6,background:RL,border:`1px solid ${RB}`,borderRadius:8,padding:"7px 11px"}}>⚠ {Math.round((new Date(newDate+"T12:00")-new Date(item.deadline+"T12:00"))/86400000)} dia(s) além do prazo máximo ({fmt(item.deadline)}). Registrada como atraso.</div>}
          <div style={{display:"flex",gap:8}}>
            {[["Hoje",today],["Amanhã",addD(today,1)],["Semana que vem",addD(today,7)]].map(([l,d])=><button key={d} onClick={()=>setNewDate(d)} style={{padding:"6px 10px",borderRadius:8,border:`1px solid ${newDate===d?Y:B2}`,background:newDate===d?YL:SF,color:newDate===d?YD:T2,fontWeight:600,fontSize:11,cursor:"pointer"}}>{l}</button>)}
          </div>
          <div style={{display:"flex",gap:8,marginTop:10}}>
            <Btn onClick={()=>{setEditingDate(false);}} v="light" style={{flex:1,padding:"9px",fontSize:12}}>Cancelar</Btn>
            <Btn onClick={()=>{onReschedule(item.id,newDate);setEditingDate(false);}} v="y" style={{flex:2,padding:"9px",fontSize:12}}>Confirmar nova data</Btn>
          </div>
        </div>}
      </div>}
      {item.completionNote&&<div style={{background:GR2,borderRadius:8,padding:"10px 14px"}}><label style={lbl}>Observação de conclusão</label><p style={{fontSize:13,color:T2}}>{item.completionNote}</p></div>}
      {(item.photos||[]).length>0&&<div><label style={lbl}>Fotos</label><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{item.photos.map((p,i)=><img key={i} src={p.data} alt="" style={{width:80,height:80,objectFit:"cover",borderRadius:8,border:`1px solid ${B1}`}}/>)}</div></div>}
      {/* Linked purchases */}
      <div style={{borderTop:`1px solid ${B1}`,paddingTop:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,flexWrap:"wrap",gap:6}}>
          <label style={{...lbl,marginBottom:0}}>Compras vinculadas {lc.length>0&&`(${lc.length})`}</label>
          {can(user,"vincular")&&<div style={{display:"flex",gap:6}}>
            <Btn onClick={()=>onLinkExisting(item)} v="light" style={{padding:"6px 10px",fontSize:11}}>🔗 Vincular existente</Btn>
            <Btn onClick={()=>onNewCompra(item.id)} v="light" style={{padding:"6px 10px",fontSize:11}}>+ Nova compra</Btn>
          </div>}
        </div>
        {lc.length===0&&<div style={{fontSize:13,color:T3}}>Nenhuma compra vinculada a esta tarefa</div>}
        {lc.map(c=><div key={c.id} style={{...card,marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontSize:13,fontWeight:600,color:T1}}>{c.produto} · {c.quantidade} {c.unidade}</div><div style={{fontSize:11,color:T3,marginTop:1}}>{c.solicitante} · {fmt(c.requestedAt)}</div></div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>{c.valor&&<span style={{fontSize:13,fontWeight:700,color:G}}>{fmtR(c.valor)}</span>}<SBadge s={c.status}/>{can(user,"vincular")&&<button onClick={()=>{if(window.confirm("Desvincular esta compra da tarefa?"))onUnlink(c.id,item.id);}} style={{background:"none",border:"none",cursor:"pointer",color:T3,fontSize:16,padding:"0 4px"}} title="Desvincular">×</button>}</div>
        </div>)}
        {totalC>0&&<div style={{background:GL,border:`1px solid ${GB}`,borderRadius:8,padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:6}}>
          <span style={{fontSize:12,fontWeight:700,color:GD,textTransform:"uppercase",letterSpacing:"0.06em"}}>Custo total da tarefa</span>
          <span style={{fontSize:18,fontWeight:800,color:G}}>{fmtR(totalC)}</span>
        </div>}
      </div>
      {/* Reschedule / pause history */}
      {(item.rescheduleHistory||[]).length>0&&<div style={{borderTop:`1px solid ${B1}`,paddingTop:12}}><label style={lbl}>Histórico de reagendamentos</label>{item.rescheduleHistory.slice(-5).reverse().map((h,i)=><div key={i} style={{fontSize:12,marginBottom:5,padding:"8px 12px",background:h.overdue?RL:YL,border:`1px solid ${h.overdue?RB:YB}`,borderRadius:8}}>
        <div style={{fontWeight:600,color:h.overdue?R:YD}}>{h.paused?"⏸ Continuar depois":h.overdue?"↻ Vencida — reprogramada":"↻ Reagendada"}</div>
        <div style={{color:T2,marginTop:2}}>Motivo: {h.reason}</div>
        <div style={{color:T3,marginTop:2}}>{h.from?fmt(h.from):"sem data"} → <b style={{color:T2}}>{fmt(h.to)}</b> · {h.by} em {fmt(h.date)} {h.time}</div>
      </div>)}</div>}
      {/* Edit history */}
      {(item.editHistory||[]).length>0&&<div style={{borderTop:`1px solid ${B1}`,paddingTop:12}}><label style={lbl}>Histórico de edições</label>{item.editHistory.slice(-3).reverse().map((h,i)=><div key={i} style={{fontSize:12,color:T3,marginBottom:3,padding:"5px 10px",background:GR2,borderRadius:6}}>Editada por <b>{h.by||"?"}</b> em {fmt(h.date)} às {h.time}</div>)}</div>}
      {/* Actions */}
      {item.status==="pending"&&(can(user,"atualizarTarefa")||can(user,"programarTarefa"))&&<div style={{display:"flex",flexDirection:"column",gap:8,paddingTop:4}}>
        {can(user,"programarTarefa")&&!item.weekendOnly&&item.scheduledDate!==today&&<Btn onClick={()=>{onSched(item.id,today);onClose();}} v="y" style={{width:"100%",padding:12,fontSize:13,borderRadius:10}}>Programar para hoje</Btn>}
        {can(user,"atualizarTarefa")&&<Btn onClick={onDone} v="success" style={{width:"100%",padding:12,fontSize:13,borderRadius:10}}>✓ Marcar como concluída</Btn>}
        {can(user,"atualizarTarefa")&&<Btn onClick={()=>onPause(item)} v="light" style={{width:"100%",padding:12,fontSize:13,borderRadius:10,background:YL,color:YD,border:`1px solid ${YB}`}}>⏸ Não concluída — continuar depois</Btn>}
        {can(user,"programarTarefa")&&item.scheduledDate&&item.scheduledDate<today&&<Btn onClick={()=>onResched(item)} v="light" style={{width:"100%",padding:12,fontSize:13,borderRadius:10,background:RL,color:R,border:`1px solid ${RB}`}}>↻ Reprogramar (tarefa vencida)</Btn>}
        {can(user,"atualizarTarefa")&&<Btn onClick={onEdit} v="light" style={{width:"100%",padding:12,fontSize:13,borderRadius:10}}>Editar tarefa</Btn>}
      </div>}
      {can(user,"excluir")&&<Btn onClick={()=>{if(window.confirm(`Excluir a tarefa "${item.title}"?\n\nEsta ação não pode ser desfeita.`))onDelete();}} v="danger" style={{width:"100%",padding:12,fontSize:13,borderRadius:10}}>Excluir tarefa</Btn>}
      <Btn onClick={onClose} v="light" style={{width:"100%",padding:12,fontSize:13,borderRadius:10}}>Fechar</Btn>
    </div>
  </Modal>;
}

/* ── TODAY TAB ───────────────────────── */
function TodayTab({tasks,prevs,compras,onOpen}){
  const today=getToday(),wknd=isWE(today);
  const crit=tasks.filter(t=>t.status==="pending"&&t.deadline&&daysLeft(t.deadline)<=2&&!t.weekendOnly);
  const critIds=new Set(crit.map(t=>t.id));
  const wkT=wknd?tasks.filter(t=>t.status==="pending"&&t.weekendOnly&&(t.scheduledDate===today||!t.scheduledDate)):[];
  const wkIds=new Set(wkT.map(t=>t.id));
  const planned=urgSort(tasks.filter(t=>t.status==="pending"&&t.scheduledDate===today&&!critIds.has(t.id)&&!wkIds.has(t.id)));
  const pdone=prevs.filter(p=>p.nextDate<=today&&p.active!==false);
  const done=tasks.filter(t=>t.status==="done"&&t.completedAt===today);
  const urgC=compras.filter(c=>(c.status==="pendente"||c.status==="aprovado"||c.status==="em_andamento")&&c.urgencia==="urgente");
  const backlog=tasks.filter(t=>t.status==="pending"&&(!t.scheduledDate||t.scheduledDate>today)&&!critIds.has(t.id)&&!t.weekendOnly);
  const[showDone,setShowDone]=useState(false);
  const manha=urgSort(planned.filter(t=>!t.period||t.period==="manha"||t.period==="ambos"));
  const tarde=urgSort(planned.filter(t=>t.period==="tarde"||t.period==="ambos"));
  const Emp=({msg})=><div style={{padding:18,borderRadius:10,border:`1.5px dashed ${B2}`,fontSize:13,color:T3,textAlign:"center",background:GR2,marginBottom:8}}>{msg}</div>;
  return<div style={{display:"flex",flexDirection:"column",gap:18}}>
    <div style={{...card,display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
      <div><div style={{fontSize:14,fontWeight:700,marginBottom:2}}>Organizar o dia</div><div style={{fontSize:13,color:T3}}>{backlog.length} no backlog · {planned.length+crit.length} programada{(planned.length+crit.length)!==1?"s":""} hoje</div></div>
      <Btn onClick={()=>onOpen("planWeek")} v="y" style={{padding:"9px 14px",fontSize:12}}>Planejar semana</Btn>
    </div>
    {urgC.length>0&&<div><SH label="Compras urgentes pendentes" c={R} count={urgC.length}/>{urgC.map(c=><div key={c.id} onClick={()=>onOpen("compraDetail",c)} style={{...card,borderLeft:`3px solid ${R}`,background:RL,borderColor:RB,marginBottom:8,cursor:"pointer"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:14,fontWeight:600,color:R,marginBottom:2}}>{c.produto}</div><div style={{display:"flex",gap:10,fontSize:12,color:T3}}><span>{c.solicitante}</span><PendDays date={c.requestedAt}/></div></div><UBadge u="urgente"/></div></div>)}</div>}
    {crit.length>0&&<div><SH label="Prazo crítico — Fazer hoje" c={R} count={crit.length}/>{urgSort(crit).map(t=><TC key={t.id} t={t} critical onCheck={()=>onOpen("checkTask",t)} onDetail={()=>onOpen("detail",t)}/>)}</div>}
    {wkT.length>0&&<div><SH label="Tarefas de fim de semana" c="#7c3aed" count={wkT.length}/>{wkT.map(t=><TC key={t.id} t={t} onCheck={()=>onOpen("checkTask",t)} onDetail={()=>onOpen("detail",t)}/>)}</div>}
    {!wknd&&tasks.filter(t=>t.status==="pending"&&t.weekendOnly).length>0&&<div style={{...card,borderLeft:"3px solid #7c3aed",padding:"11px 15px"}}><b style={{color:"#7c3aed",fontSize:12}}>FIM DE SEMANA — </b><span style={{fontSize:13,color:T2}}>{tasks.filter(t=>t.status==="pending"&&t.weekendOnly).length} tarefa{tasks.filter(t=>t.status==="pending"&&t.weekendOnly).length!==1?"s":""} reservada</span></div>}
    {pdone.length>0&&<div><SH label="Preventivas do dia" c="#1d4ed8" count={pdone.length}/>{pdone.map(p=><div key={p.id} style={{...card,borderLeft:"3px solid #2563eb",marginBottom:8}}><div style={{display:"flex",alignItems:"center",gap:12}}><button onClick={()=>onOpen("checkPrev",p)} style={{width:42,height:42,borderRadius:10,border:"2px solid #2563eb",background:"#eff6ff",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:700,color:"#2563eb"}}>✓</button><div><div style={{fontSize:14,fontWeight:600,color:T1,marginBottom:2}}>{p.title}</div><div style={{fontSize:12,color:T3}}>{{daily:"Diária",weekly:"Semanal",monthly:"Mensal"}[p.recurrence]} {p.responsible&&`· ${p.responsible}`}</div></div></div></div>)}</div>}
    <div><SH label="Manhã"/>{manha.length===0&&<Emp msg="Nenhuma tarefa programada para a manhã"/>}{manha.map(t=><TC key={t.id} t={t} onCheck={()=>onOpen("checkTask",t)} onDetail={()=>onOpen("detail",t)}/>)}</div>
    <div><SH label="Tarde"/>{tarde.length===0&&<Emp msg="Nenhuma tarefa programada para a tarde"/>}{tarde.map(t=><TC key={t.id} t={t} onCheck={()=>onOpen("checkTask",t)} onDetail={()=>onOpen("detail",t)}/>)}</div>
    {done.length>0&&<div>
      <button onClick={()=>setShowDone(v=>!v)} style={{background:"none",border:"none",cursor:"pointer",color:T3,fontWeight:600,fontSize:12,padding:"6px 0",display:"flex",alignItems:"center",gap:8}}>{showDone?"▾":"▸"} Concluídas hoje <NBadge n={done.length} bg={G}/></button>
      {showDone&&done.map(t=><div key={t.id} style={{...card,marginTop:6,marginBottom:6,opacity:0.7,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:13,color:T3,textDecoration:"line-through"}}>{t.title}</div><div style={{fontSize:12,color:T3,marginTop:2}}>{t.completedBy} · {t.completedTime}</div></div><SBadge s="concluido"/></div>)}
    </div>}
  </div>;
}

/* ── WEEK TAB ────────────────────────── */
function WeekTab({tasks,onOpen,onSchedOne}){
  const today=getToday();
  const[ws,setWs]=useState(getWeekStart(today));
  const days=getWeekDays(ws);
  const[od,setOd]=useState(today);
  const goW=n=>setWs(addD(ws,n*7));
  const dayT=d=>urgSort(tasks.filter(t=>t.status==="pending"&&t.scheduledDate===d));
  const overdue=urgSort(tasks.filter(t=>t.status==="pending"&&t.scheduledDate&&t.scheduledDate<today));
  const crit=urgSort(tasks.filter(t=>t.status==="pending"&&t.deadline&&daysLeft(t.deadline)<=2&&(!t.scheduledDate||t.scheduledDate>today)));
  return<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"flex",alignItems:"center",gap:8}}>
      <Btn onClick={()=>goW(-1)} v="light" style={{padding:"8px 12px"}}>◀</Btn>
      <div style={{flex:1,textAlign:"center"}}><div style={{fontWeight:700,fontSize:14,color:T1}}>{fmt(ws)} — {fmt(addD(ws,6))}</div>{ws!==getWeekStart(today)&&<button onClick={()=>setWs(getWeekStart(today))} style={{background:"none",border:"none",cursor:"pointer",color:YD,fontSize:12,fontWeight:600}}>Esta semana</button>}</div>
      <Btn onClick={()=>goW(1)} v="light" style={{padding:"8px 12px"}}>▶</Btn>
      <Btn onClick={()=>onOpen("planWeek")} v="y" style={{padding:"8px 12px",fontSize:12}}>Planejar</Btn>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
      {days.map(d=>{const dt=dayT(d);const isT=d===today;const iP=d<today;const isO=od===d;return<div key={d} onClick={()=>setOd(isO?null:d)} style={{padding:"8px 4px",borderRadius:10,cursor:"pointer",background:isT?YL:isO?GR2:SF,border:`1.5px solid ${isT?YB:isO?B2:B1}`,textAlign:"center",boxShadow:SHADOW}}>
        <div style={{fontWeight:700,fontSize:11,color:isT?YD:iP?T3:T1}}>{dayS(d)}</div>
        <div style={{fontSize:10,color:T3,marginBottom:4}}>{fmt(d).slice(0,5)}</div>
        {dt.length>0?<span style={{background:isT?Y:B2,color:isT?DK:T2,borderRadius:10,fontSize:10,fontWeight:700,padding:"1px 6px"}}>{dt.length}</span>:<span style={{fontSize:10,color:T3}}>—</span>}
      </div>;})}
    </div>
    {overdue.length>0&&<div><SH label="Não realizadas — Reagendar" c={R} count={overdue.length}/>{overdue.map(t=><div key={t.id} style={{...card,borderLeft:`3px solid ${R}`,background:RL,borderColor:RB,marginBottom:8}}><div style={{display:"flex",alignItems:"center",gap:10}}><div style={{flex:1,cursor:"pointer"}} onClick={()=>onOpen("detail",t)}><div style={{fontSize:14,fontWeight:600,color:R,marginBottom:3}}>{t.title}</div><div style={{fontSize:12,color:T3}}>{dayS(t.scheduledDate)} {fmt(t.scheduledDate)} · <DLBadge dl={t.deadline}/></div></div><Btn onClick={()=>onSchedOne(t.id,today)} v="y" style={{padding:"7px 12px",fontSize:11}}>Hoje</Btn><Btn onClick={()=>onOpen("reschedule",t)} v="light" style={{padding:"7px 10px",fontSize:11}}>↻</Btn></div></div>)}</div>}
    {crit.length>0&&<div><SH label="Prazo crítico" c={R} count={crit.length}/>{crit.map(t=><TC key={t.id} t={t} critical onCheck={()=>onOpen("checkTask",t)} onDetail={()=>onOpen("detail",t)}/>)}</div>}
    {od&&<div>
      <SH label={`${dayF(od)} ${fmt(od)}${od===today?" — Hoje":""}`} c={od===today?YD:T2}/>
      {dayT(od).length===0&&<div style={{padding:16,borderRadius:10,border:`1.5px dashed ${B2}`,fontSize:13,color:T3,textAlign:"center",background:GR2}}>Nenhuma tarefa programada</div>}
      {dayT(od).map(t=><TC key={t.id} t={t} onCheck={()=>onOpen("checkTask",t)} onDetail={()=>onOpen("detail",t)}/>)}
      <Btn onClick={()=>onOpen("planWeek")} v="light" style={{width:"100%",padding:11,fontSize:12,marginTop:4}}>+ Adicionar tarefa a este dia</Btn>
    </div>}
  </div>;
}

/* ── WEEK PLANNER MODAL ──────────────── */
function WeekPlannerModal({tasks,onClose,onAssign}){
  const today=getToday(),ws=getWeekStart(today);
  const days=getWeekDays(ws);
  const[sel,setSel]=useState([]);
  const[tgt,setTgt]=useState(today);
  const backlog=urgSort(tasks.filter(t=>t.status==="pending"&&(!t.scheduledDate||t.scheduledDate<today)&&!t.weekendOnly));
  const weekT=tasks.filter(t=>t.status==="pending"&&t.scheduledDate&&inRange(t.scheduledDate,ws,addD(ws,6)));
  const toggle=id=>setSel(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);
  return<Modal title="Planejar a semana" onClose={onClose} onSave={()=>{if(sel.length>0)onAssign(sel,tgt);else onClose();}} saveLabel={sel.length>0?`Programar ${sel.length} para ${dayS(tgt)}`:"Fechar"} wide>
    <F label="Dia de execução"><div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:5}}>{days.map(d=><button key={d} onClick={()=>setTgt(d)} style={{padding:"8px 4px",borderRadius:8,cursor:"pointer",background:tgt===d?Y:d===today?YL:GR2,border:`1.5px solid ${tgt===d?YD:d===today?YB:B1}`,color:tgt===d?DK:d===today?YD:T2,fontWeight:600,fontSize:11,textAlign:"center"}}><div>{dayS(d)}</div><div style={{fontSize:10,opacity:0.8}}>{fmt(d).slice(0,5)}</div></button>)}</div></F>
    {weekT.length>0&&<div style={{marginBottom:16,background:GR2,borderRadius:8,padding:"12px 14px"}}><div style={{fontSize:11,fontWeight:700,color:T3,textTransform:"uppercase",marginBottom:8}}>Já programadas ({weekT.length})</div>{weekT.map(t=><div key={t.id} style={{display:"flex",justifyContent:"space-between",fontSize:13,color:T2,marginBottom:4}}><span>{t.title.slice(0,40)}</span><span>{dayS(t.scheduledDate)}</span></div>)}</div>}
    <div style={{fontSize:11,fontWeight:700,color:T3,textTransform:"uppercase",marginBottom:8}}>Backlog</div>
    {backlog.length===0&&<div style={{fontSize:13,color:T3,padding:14,textAlign:"center",background:GR2,borderRadius:8}}>Backlog vazio</div>}
    {backlog.map(t=>{const s2=sel.includes(t.id);return<div key={t.id} onClick={()=>toggle(t.id)} style={{...card,marginBottom:8,cursor:"pointer",background:s2?YL:SF,border:`1.5px solid ${s2?YB:B1}`,display:"flex",alignItems:"center",gap:12}}>
      <div style={{width:20,height:20,borderRadius:5,border:`2px solid ${s2?Y:B2}`,background:s2?Y:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,color:DK,fontSize:11,fontWeight:700}}>{s2&&"✓"}</div>
      <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:T1,marginBottom:2}}>{t.title}</div><div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}><UBadge u={t.urgency}/><DLBadge dl={t.deadline}/>{t.requester&&<span style={{fontSize:11,color:T3}}>{t.requester}</span>}</div></div>
    </div>;})}
  </Modal>;
}

/* ── RESCHEDULE MODAL ────────────────── */
function RescheduleModal({item,mode,onClose,onConfirm}){
  // mode: "reschedule" (vencida) or "pause" (iniciada, continuar depois)
  const isPause=mode==="pause";
  const[date,setDate]=useState(isPause?addD(getToday(),1):getToday());
  const[reason,setReason]=useState("");
  const reasons=isPause
    ?["Faltou tempo no dia","Aguardando peça/material","Depende de terceiros","Será continuada depois"]
    :["Faltou peça/material","Dependia de terceiros","Impedimento no processo","Faltou tempo","Outro motivo"];
  const pastDeadline=item?.deadline&&date>item.deadline;
  const daysOver=item?.deadline?Math.round((new Date(date+"T12:00")-new Date(item.deadline+"T12:00"))/86400000):0;
  const save=()=>{
    if(!reason.trim())return alert("Informe o motivo.");
    onConfirm(item.id,date,reason);
  };
  return<Modal title={isPause?"Continuar depois":"Reprogramar tarefa vencida"} onClose={onClose} onSave={save} saveLabel={isPause?"Salvar e reagendar":"Reprogramar"}>
    <div style={{marginBottom:14,fontSize:14,fontWeight:600,color:T1,padding:"12px 14px",background:isPause?YL:RL,border:`1px solid ${isPause?YB:RB}`,borderRadius:8}}>
      {item?.title}
      {item?.deadline&&<div style={{fontSize:12,fontWeight:400,color:T2,marginTop:3}}>Prazo máximo: {fmt(item.deadline)}</div>}
      {!isPause&&item?.scheduledDate&&<div style={{fontSize:12,fontWeight:400,color:R,marginTop:3}}>Estava programada para {dayS(item.scheduledDate)}, {fmt(item.scheduledDate)}</div>}
    </div>
    <F label="Motivo" req>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
        {reasons.map(rz=><button key={rz} onClick={()=>setReason(rz)} style={{padding:"7px 12px",borderRadius:20,border:`1.5px solid ${reason===rz?Y:B2}`,background:reason===rz?YL:SF,color:reason===rz?YD:T2,fontWeight:600,fontSize:12,cursor:"pointer"}}>{rz}</button>)}
      </div>
      <Inp2 value={reason} onChange={e=>setReason(e.target.value)} placeholder="Descreva o motivo"/>
    </F>
    <F label="Nova data para continuar" req><Inp2 type="date" value={date} onChange={e=>setDate(e.target.value)} min={getToday()}/></F>
    {pastDeadline&&<div style={{fontSize:12,color:R,fontWeight:600,marginTop:-8,marginBottom:8,background:RL,border:`1px solid ${RB}`,borderRadius:8,padding:"8px 12px"}}>⚠ Esta data fica {daysOver} dia{daysOver>1?"s":""} além do prazo máximo. A tarefa será registrada como entregue em atraso.</div>}
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>{[["Amanhã",addD(getToday(),1)],["Em 2 dias",addD(getToday(),2)],["Semana que vem",addD(getToday(),7)]].map(([l,d])=><Btn key={d} onClick={()=>setDate(d)} v={date===d?"y":"light"} style={{padding:"9px 6px",fontSize:12,borderRadius:8}}>{l}</Btn>)}</div>
  </Modal>;
}

/* ── REPORTS TAB ─────────────────────── */
function ReportsTab({tasks,compras}){
  const today=getToday();
  const curY=getCurrentYear(),curM=getCurrentMonth();
  const[from,setFrom]=useState(`${curY}-${String(curM).padStart(2,"0")}-01`);
  const[to,setTo]=useState(today);
  const[view,setView]=useState("tasks");
  const[searchT,setSearchT]=useState("");
  const[typeFilter,setTypeFilter]=useState("all");
  const[searchC,setSearchC]=useState("");
  const[filterSolic,setFilterSolic]=useState("");
  const[filterEmp,setFilterEmp]=useState("");
  const[filterTask,setFilterTask]=useState("");

  const doneTasks=useMemo(()=>{
    let r=tasks.filter(t=>t.status==="done"&&t.completedAt&&inRange(t.completedAt,from,to));
    if(typeFilter==="adhoc")r=r.filter(t=>t.type==="adhoc");
    if(typeFilter==="programada")r=r.filter(t=>t.type!=="adhoc");
    if(searchT.trim()){const q=searchT.toLowerCase();r=r.filter(t=>[t.title,t.description,t.completedBy,t.requester,t.completionNote].filter(Boolean).some(f=>f.toLowerCase().includes(q)));}
    return r.sort((a,b)=>b.completedAt>a.completedAt?1:-1);
  },[tasks,from,to,typeFilter,searchT]);

  const doneCompras=useMemo(()=>{
    // Use completedAt if present, otherwise fall back to requestedAt so no concluded compra is ever lost
    let r=compras.filter(c=>{if(c.status!=="concluido")return false;const refDate=c.completedAt||c.requestedAt;return refDate&&inRange(refDate,from,to);});
    if(searchC.trim()){const q=searchC.toLowerCase();r=r.filter(c=>[c.produto,c.solicitante,c.empresa,c.observacoes,c.marca].filter(Boolean).some(f=>f.toLowerCase().includes(q)));}
    if(filterSolic)r=r.filter(c=>c.solicitante?.toLowerCase().includes(filterSolic.toLowerCase()));
    if(filterEmp)r=r.filter(c=>c.empresa?.toLowerCase().includes(filterEmp.toLowerCase()));
    if(filterTask){r=r.filter(c=>compraTaskIds(c).includes(filterTask));}
    return r.sort((a,b)=>(b.completedAt||b.requestedAt||"")>(a.completedAt||a.requestedAt||"")?1:-1);
  },[compras,tasks,from,to,searchC,filterSolic,filterEmp,filterTask]);

/* ── SEARCH TAB ──────────────────────── */
function SearchTab({tasks,compras,prevs,onOpen}){
  const[q,setQ]=useState("");
  const qL=q.toLowerCase().trim();
  const rT=useMemo(()=>{if(qL.length<2)return[];return tasks.filter(t=>[t.title,t.description,t.responsible,t.requester,t.completionNote].filter(Boolean).some(f=>f.toLowerCase().includes(qL)));
  },[qL,tasks]);
  const rC=useMemo(()=>{if(qL.length<2)return[];return compras.filter(c=>[c.produto,c.solicitante,c.empresa,c.observacoes].filter(Boolean).some(f=>f.toLowerCase().includes(qL)));
  },[qL,compras]);
  const rP=useMemo(()=>{if(qL.length<2)return[];return prevs.filter(p=>[p.title,p.responsible].filter(Boolean).some(f=>f.toLowerCase().includes(qL)));
  },[qL,prevs]);
  const total=rT.length+rC.length+rP.length;
  const HL=({text})=>{if(!qL||!text)return<span>{text}</span>;const i=text.toLowerCase().indexOf(qL);if(i<0)return<span>{text}</span>;return<span>{text.slice(0,i)}<mark style={{background:Y+"88",borderRadius:2,padding:"0 1px"}}>{text.slice(i,i+qL.length)}</mark>{text.slice(i+qL.length)}</span>;};
  return<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{fontWeight:700,fontSize:17,color:T1}}>Pesquisar</div>
    <div style={{position:"relative"}}>
      <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Pesquisar tarefas, compras, preventivas..." style={{...inp,paddingLeft:40,fontSize:15}} autoFocus/>
      <span style={{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)",color:T3,fontSize:16}}>🔍</span>
      {q&&<button onClick={()=>setQ("")} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:T3,fontSize:16}}>×</button>}
    </div>
    {q.length>0&&q.length<2&&<div style={{fontSize:13,color:T3,textAlign:"center",padding:10}}>Digite ao menos 2 caracteres</div>}
    {qL.length>=2&&total===0&&<div style={{fontSize:13,color:T3,textAlign:"center",padding:20,background:GR2,borderRadius:10}}>Nenhum resultado para "{q}"</div>}
    {qL.length>=2&&total>0&&<div style={{fontSize:12,color:T3}}>{total} resultado{total!==1?"s":""} para <b>"{q}"</b></div>}
    {rT.length>0&&<div><SH label={`Tarefas (${rT.length})`} c={R}/>{rT.map(t=><div key={t.id} onClick={()=>onOpen("detail",t)} style={{...card,marginBottom:8,cursor:"pointer",borderLeft:`3px solid ${t.urgency==="critica"?R:t.urgency==="alta"?Y:B2}`}}><div style={{display:"flex",justifyContent:"space-between",gap:10}}><div style={{flex:1}}><div style={{fontSize:14,fontWeight:600,color:T1,marginBottom:3}}><HL text={t.title}/></div><div style={{display:"flex",gap:8,flexWrap:"wrap",fontSize:12,color:T3}}><SBadge s={t.status==="done"?"concluido":"pendente"}/>{t.urgency!=="normal"&&<UBadge u={t.urgency}/>}{t.responsible&&<span><HL text={t.responsible}/></span>}{t.requester&&<span>Solic: <HL text={t.requester}/></span>}{t.deadline&&<span>Prazo: {fmt(t.deadline)}</span>}</div></div><span style={{color:T3,fontSize:18}}>›</span></div></div>)}</div>}
    {rC.length>0&&<div><SH label={`Compras (${rC.length})`} c={YD}/>{rC.map(c=><div key={c.id} onClick={()=>onOpen("compraDetail",c)} style={{...card,marginBottom:8,cursor:"pointer",borderLeft:`3px solid ${c.urgencia==="urgente"?R:B2}`}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}><div style={{flex:1}}><div style={{fontSize:14,fontWeight:600,color:T1,marginBottom:3}}><HL text={c.produto}/></div><div style={{display:"flex",gap:8,flexWrap:"wrap",fontSize:12,color:T3}}><SBadge s={c.status}/><span>Solic: <HL text={c.solicitante}/></span><span>{c.quantidade} {c.unidade}</span><PendDays date={c.requestedAt}/>{c.valor&&<span style={{color:G,fontWeight:700}}>{fmtR(c.valor)}</span>}</div></div><span style={{color:T3,fontSize:18}}>›</span></div></div>)}</div>}
    {rP.length>0&&<div><SH label={`Preventivas (${rP.length})`} c="#2563eb"/>{rP.map(p=><div key={p.id} style={{...card,marginBottom:8}}><div style={{fontSize:14,fontWeight:600,color:T1,marginBottom:2}}><HL text={p.title}/></div><div style={{fontSize:12,color:T3,display:"flex",gap:10}}><Pill c="#1d4ed8" bg="#eff6ff" bd="#bfdbfe" ch={{daily:"Diária",weekly:"Semanal",monthly:"Mensal"}[p.recurrence]}/><span>Próxima: {fmt(p.nextDate)}</span>{p.responsible&&<span><HL text={p.responsible}/></span>}</div></div>)}</div>}

  </div>;

/* ── BACKUP ──────────────────────────── */
function BackupModal({tasks,prevs,imps,compras,onClose}){
  const[status,setStatus]=useState("");
  const exp=()=>{
    const d={tasks,prevs,imps,compras,exportedAt:new Date().toISOString(),version:"3"};
    const b=new Blob([JSON.stringify(d,null,2)],{type:"application/json"});
    const u=URL.createObjectURL(b);const a=document.createElement("a");
    a.href=u;a.download=`frispar-backup-${getToday()}.json`;a.click();URL.revokeObjectURL(u);
  };
  const imp=()=>{
    const input=document.createElement("input");input.type="file";input.accept=".json";
    input.onchange=async e=>{
      const file=e.target.files[0];if(!file)return;
      const reader=new FileReader();
      reader.onload=async ev=>{
        try{
          const d=JSON.parse(ev.target.result);
          const db=getDB();
          setStatus("Importando...");
          const writeAll=async(col,items)=>{
            if(!items||!items.length)return;
            const SIZE=400;
            for(let i=0;i<items.length;i+=SIZE){
              const batch=db.batch();
              items.slice(i,i+SIZE).forEach(item=>{
                if(item&&item.id)batch.set(db.collection(col).doc(item.id),item);
              });
              await batch.commit();
            }
          };
          if(d.tasks)await writeAll(COLS.tasks,d.tasks);
          if(d.prevs)await writeAll(COLS.prevs,d.prevs);
          if(d.imps)await writeAll(COLS.imps,d.imps);
          if(d.compras)await writeAll(COLS.compras,d.compras);
          setStatus("");
          alert("Importação concluída! Os dados já aparecem em tempo real para todos.");
        }catch(err){setStatus("");alert("Erro ao importar: "+err.message);}
      };
      reader.readAsText(file);
    };
    input.click();
  };
  return<Modal title="Backup de dados" onClose={onClose}>
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{background:GL,border:`1px solid ${GB}`,borderRadius:8,padding:"12px 14px",fontSize:13,color:GD}}>
        ✓ Dados sincronizados em tempo real via Firebase para toda a equipe.
      </div>
      <div style={{...card}}>
        <div style={{fontWeight:700,fontSize:14,color:T1,marginBottom:4}}>Exportar backup</div>
        <div style={{fontSize:13,color:T2,marginBottom:10}}>Gera um arquivo JSON com todos os dados atuais como segurança.</div>
        <Btn onClick={exp} v="y" style={{width:"100%",padding:12,fontSize:13}}>⬇ Baixar backup (.json)</Btn>
      </div>
      <div style={{...card}}>
        <div style={{fontWeight:700,fontSize:14,color:T1,marginBottom:4}}>Importar dados</div>
        <div style={{fontSize:13,color:T2,marginBottom:10}}><b style={{color:R}}>Atenção:</b> importa e mescla dados no Firebase. Dados existentes com mesmo ID serão sobrescritos.</div>
        <Btn onClick={imp} v="light" style={{width:"100%",padding:12,fontSize:13,opacity:status?0.6:1}}>
          {status||"⬆ Importar arquivo de backup"}
        </Btn>
      </div>
    </div>
  </Modal>;
}

/* ── CHANGE PASSWORD MODAL ───────────── */
function ChangePwdModal({user,onSave,onClose,forced}){
  const[p1,setP1]=useState("");
  const[p2,setP2]=useState("");
  const[err,setErr]=useState("");
  const save=()=>{
    if(p1.length<4)return setErr("A senha deve ter ao menos 4 caracteres.");
    if(p1!==p2)return setErr("As senhas não coincidem.");
    if(p1==="1234")return setErr("Escolha uma senha diferente da padrão.");
    onSave(p1);
  };
  return<div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.6)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
    <div style={{background:SF,borderRadius:16,padding:24,width:"100%",maxWidth:400,boxShadow:"0 10px 40px rgba(0,0,0,0.3)"}}>
      <div style={{fontWeight:700,fontSize:17,color:T1,marginBottom:4}}>{forced?"Defina sua senha":"Alterar senha"}</div>
      <div style={{fontSize:13,color:T2,marginBottom:18}}>{forced?"Este é seu primeiro acesso. Crie uma senha pessoal.":"Crie uma nova senha de acesso."}</div>
      <F label="Nova senha"><input type="password" value={p1} autoFocus onChange={e=>{setP1(e.target.value);setErr("");}} placeholder="Mínimo 4 caracteres" style={{...inp,fontSize:16}}/></F>
      <F label="Confirmar senha"><input type="password" value={p2} onChange={e=>{setP2(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&save()} placeholder="Repita a senha" style={{...inp,fontSize:16}}/></F>
      {err&&<div style={{fontSize:13,color:R,marginBottom:12}}>{err}</div>}
      <div style={{display:"flex",gap:10,marginTop:8}}>

  </div>;
}

/* ── DASHBOARD ───────────────────────── */
function Dashboard({tasks,compras,prevs,user,onOpen,onGoTab}){
  const today=getToday();
  const pendTasks=tasks.filter(t=>t.status==="pending");
  const overdueTasks=pendTasks.filter(t=>t.scheduledDate&&t.scheduledDate<today);
  const todayTasks=pendTasks.filter(t=>t.scheduledDate===today);
  const weekEnd=addD(getWeekStart(today),6);
  const weekTasks=pendTasks.filter(t=>t.scheduledDate&&inRange(t.scheduledDate,today,weekEnd));
  const doneWeek=tasks.filter(t=>t.status==="done"&&t.completedAt&&inRange(t.completedAt,getWeekStart(today),weekEnd));
  const compAprov=compras.filter(c=>c.status==="aprovado");
  const compAndamento=compras.filter(c=>c.status==="em_andamento");
  const compPend=compras.filter(c=>c.status==="pendente");
  const compConcMonth=compras.filter(c=>c.status==="concluido"&&c.completedAt&&c.completedAt.startsWith(today.slice(0,7)));
  const gastoMonth=compConcMonth.reduce((s,c)=>s+parseFloat(c.valor||0),0);
  const prevDue=prevs.filter(p=>p.nextDate<=today&&p.active!==false);

  const Stat=({n,label,color,onClick,sub})=><div onClick={onClick} style={{background:SF,border:`1px solid ${B1}`,borderTop:`3px solid ${color}`,borderRadius:12,padding:"16px 14px",boxShadow:SHADOW,cursor:onClick?"pointer":"default",transition:"transform 0.1s"}}>
    <div style={{fontSize:32,fontWeight:800,color,lineHeight:1}}>{n}</div>
    <div style={{fontSize:12,color:T2,marginTop:6,fontWeight:600}}>{label}</div>
    {sub&&<div style={{fontSize:11,color:T3,marginTop:2}}>{sub}</div>}
  </div>;

  return<div style={{display:"flex",flexDirection:"column",gap:20}}>
    <div>
      <div style={{fontSize:13,color:T3}}>{dayF(today)}, {fmt(today)}</div>
      <div style={{fontSize:22,fontWeight:800,color:T1}}>Olá, {user.nome.split(" ")[0]}!</div>
    </div>

    {/* Tarefas */}
    <div>
      <SH label="Tarefas" c={Y}/>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10}}>
        <Stat n={overdueTasks.length} label="Atrasadas" color={R} onClick={()=>onGoTab("week")}/>
        <Stat n={todayTasks.length} label="Para hoje" color={Y} onClick={()=>onGoTab("today")}/>
        <Stat n={weekTasks.length} label="Esta semana" color="#2563eb" onClick={()=>onGoTab("week")}/>
        <Stat n={doneWeek.length} label="Concluídas (semana)" color={G}/>
      </div>
    </div>

    {/* Compras */}
    <div>
      <SH label="Compras" c="#2563eb"/>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10}}>
        <Stat n={compPend.length} label="Aguardando aprovação" color={YD} onClick={()=>onGoTab("compras")}/>
        <Stat n={compAprov.length+compAndamento.length} label="Em andamento" color="#ea580c" onClick={()=>onGoTab("compras")}/>
        <Stat n={compConcMonth.length} label="Concluídas (mês)" color={G} sub={fmtR(gastoMonth)}/>
      </div>
    </div>

    {/* Alertas / prioridades */}
    {(overdueTasks.length>0||prevDue.length>0||compras.filter(c=>c.urgencia==="urgente"&&c.status!=="concluido"&&c.status!=="reprovado").length>0)&&<div>
      <SH label="Precisa de atenção" c={R}/>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {overdueTasks.length>0&&<div onClick={()=>onGoTab("week")} style={{...card,borderLeft:`3px solid ${R}`,background:RL,borderColor:RB,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontSize:14,fontWeight:600,color:R}}>{overdueTasks.length} tarefa{overdueTasks.length>1?"s":""} atrasada{overdueTasks.length>1?"s":""}</div><div style={{fontSize:12,color:T3}}>Precisam ser reagendadas</div></div>
          <span style={{color:R,fontSize:18}}>›</span>
        </div>}
        {compras.filter(c=>c.urgencia==="urgente"&&c.status!=="concluido"&&c.status!=="reprovado").length>0&&<div onClick={()=>onGoTab("compras")} style={{...card,borderLeft:`3px solid ${R}`,background:RL,borderColor:RB,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontSize:14,fontWeight:600,color:R}}>{compras.filter(c=>c.urgencia==="urgente"&&c.status!=="concluido"&&c.status!=="reprovado").length} compra{compras.filter(c=>c.urgencia==="urgente"&&c.status!=="concluido"&&c.status!=="reprovado").length>1?"s":""} urgente{compras.filter(c=>c.urgencia==="urgente"&&c.status!=="concluido"&&c.status!=="reprovado").length>1?"s":""}</div><div style={{fontSize:12,color:T3}}>Aguardando providência</div></div>

/* ── APP ROOT ────────────────────────── */
function App(){
  const[tasks,setTasks]=useState([]);
  const[prevs,setPrevs]=useState([]);
  const[imps,setImps]=useState([]);
  const[compras,setCompras]=useState([]);
  const[users,setUsers]=useState([]);
  const[logs,setLogs]=useState([]);
  const[currentUser,setCurrentUser]=useState(null);
  const[authReady,setAuthReady]=useState(false);
  const[tab,setTab]=useState("dashboard");
  const[modal,setModal]=useState(null);
  const[mdata,setMdata]=useState(null);

  // ── FIREBASE REAL-TIME SYNC ──────────────────────
  useEffect(()=>{
    const db=getDB();
    const unsubs=[];
    unsubs.push(db.collection(COLS.tasks).onSnapshot(snap=>{
      setTasks(carry(snap.docs.map(d=>({...d.data(),id:d.id}))));
    },(err)=>console.error("tasks",err)));
    unsubs.push(db.collection(COLS.prevs).onSnapshot(snap=>{
      setPrevs(snap.docs.map(d=>({...d.data(),id:d.id})));
    },(err)=>console.error("prevs",err)));
    unsubs.push(db.collection(COLS.imps).onSnapshot(snap=>{
      setImps(snap.docs.map(d=>({...d.data(),id:d.id})));
    },(err)=>console.error("imps",err)));
    unsubs.push(db.collection(COLS.compras).onSnapshot(snap=>{
      setCompras(snap.docs.map(d=>({...d.data(),id:d.id})));
    },(err)=>console.error("compras",err)));
    unsubs.push(db.collection(COLS.logs).onSnapshot(snap=>{
      setLogs(snap.docs.map(d=>({...d.data(),id:d.id})));
    },(err)=>console.error("logs",err)));
    unsubs.push(db.collection(COLS.users).onSnapshot(async snap=>{
      let list=snap.docs.map(d=>({...d.data(),id:d.id}));
      // Seed users on first run
      if(list.length===0){
        const batch=db.batch();
        SEED_USERS.forEach(u=>{const id=uid();batch.set(db.collection(COLS.users).doc(id),{...u,id,pwdHash:hashPwd("1234"),mustChangePwd:true,createdAt:getToday()});});
        await batch.commit();
        return; // snapshot will refire with seeded users
      }
      setUsers(list);
      setAuthReady(true);
    },(err)=>{console.error("users",err);setAuthReady(true);}));
    return()=>unsubs.forEach(u=>u());
  },[]);

  // Restore session
  useEffect(()=>{
    if(!authReady||currentUser)return;
    const savedId=sLoad("fr_session");
    if(savedId){const u=users.find(x=>x.id===savedId);if(u)setCurrentUser(u);}
  },[authReady,users,currentUser]);

  // Auto-cleanup logs older than 90 days
  useEffect(()=>{
    if(!currentUser||!can(currentUser,"verLogs"))return;
    const cutoff=addD(getToday(),-90);
    const old=logs.filter(l=>l.ts&&l.ts.slice(0,10)<cutoff);
    if(old.length>0){
      const db=getDB();const batch=db.batch();
      old.slice(0,400).forEach(l=>batch.delete(db.collection(COLS.logs).doc(l.id)));
      batch.commit().catch(e=>console.error("log cleanup",e));
    }
  },[logs,currentUser]);

  const open=(m,d=null)=>{setModal(m);setMdata(d);};
  const close=()=>{setModal(null);setMdata(null);};
  const db=getDB();

  // ── AUDIT LOG ──
  const log=async(action,entity,opts={})=>{
    if(!currentUser)return;
    const id=uid();
    try{await db.collection(COLS.logs).doc(id).set({id,ts:new Date().toISOString(),userId:currentUser.id,userName:currentUser.nome,action,entity,detail:opts.detail||"",oldVal:opts.oldVal||"",newVal:opts.newVal||""});}catch(e){console.error("log",e);}
  };

  // ── AUTH ──
  const doLogin=u=>{setCurrentUser(u);sSave("fr_session",u.id);log("login","Sistema",{detail:u.nome+" entrou"});if(u.mustChangePwd)setModal("forcePwd");};
  const doLogout=()=>{setCurrentUser(null);sSave("fr_session",null);setTab("dashboard");};
  const changePwd=async newPwd=>{await db.collection(COLS.users).doc(currentUser.id).update({pwdHash:hashPwd(newPwd),mustChangePwd:false});setCurrentUser({...currentUser,mustChangePwd:false});log("pwd","Sistema",{detail:"Senha alterada"});close();};

  // ── USER MGMT ──
  const addUser=async u=>{const id=uid();await db.collection(COLS.users).doc(id).set({...u,id,pwdHash:hashPwd("1234"),mustChangePwd:true,createdAt:getToday()});log("user","Usuário",{detail:"Criou "+u.nome,newVal:ROLES[u.role]?.label});};
  const updateUser=async(id,f)=>{const u=users.find(x=>x.id===id);await db.collection(COLS.users).doc(id).update(f);if(f.role)log("user","Usuário",{detail:u?.nome,oldVal:ROLES[u?.role]?.label,newVal:ROLES[f.role]?.label});};
  const deleteUser=async id=>{const u=users.find(x=>x.id===id);await db.collection(COLS.users).doc(id).delete();log("user","Usuário",{detail:"Excluiu "+(u?.nome||"")});};
  const resetPwd=async id=>{await db.collection(COLS.users).doc(id).update({pwdHash:hashPwd("1234"),mustChangePwd:true});const u=users.find(x=>x.id===id);log("user","Usuário",{detail:"Resetou senha de "+(u?.nome||"")});};

  const addTask=async t=>{const id=uid();await db.collection(COLS.tasks).doc(id).set({...t,id,createdAt:getToday(),createdBy:currentUser.nome,status:"pending",scheduledDate:null,editHistory:[]});log("create","Tarefa",{detail:t.title});};
  const editTask=async(id,f)=>{const curr=tasks.find(t=>t.id===id)||{};const h=[...(curr.editHistory||[]),{by:currentUser.nome,date:getToday(),time:nowTime()}];await db.collection(COLS.tasks).doc(id).update({...f,editHistory:h});log("edit","Tarefa",{detail:f.title||curr.title});};
  const doneTask=async(id,i)=>{const curr=tasks.find(t=>t.id===id)||{};const rawPhotos=[...(curr.photos||[]),...(i.photos||[])];const photos=await compressPhotos(rawPhotos);const td=getToday();const lateDays=curr.deadline&&td>curr.deadline?Math.round((new Date(td+"T12:00")-new Date(curr.deadline+"T12:00"))/86400000):0;await db.collection(COLS.tasks).doc(id).update({status:"done",completedAt:td,completedTime:i.time,completedBy:i.responsible,completionNote:i.note,photos,lateDays});log("status","Tarefa",{detail:curr.title+(lateDays>0?" (atraso "+lateDays+"d)":""),oldVal:"Pendente",newVal:"Concluída"});};
  const addAdhoc=async t=>{const id=uid();const photos=await compressPhotos(t.photos||[]);await db.collection(COLS.tasks).doc(id).set({...t,photos,id,status:"done",type:"adhoc",createdBy:currentUser.nome,editHistory:[]});log("create","Tarefa avulsa",{detail:t.title});};
  const schedOne=async(id,d)=>{await db.collection(COLS.tasks).doc(id).update({scheduledDate:d});};
  const schedMany=async(ids,d)=>{const batch=db.batch();ids.forEach(id=>batch.update(db.collection(COLS.tasks).doc(id),{scheduledDate:d}));await batch.commit();log("edit","Tarefas",{detail:ids.length+" programada(s) para "+fmt(d)});};
  // Reprogramar tarefa vencida (com motivo + histórico)
  const rescheduleTask=async(id,newDate,reason)=>{
    const t=tasks.find(x=>x.id===id)||{};
    const wasOverdue=t.scheduledDate&&t.scheduledDate<getToday();
    const hist=[...(t.rescheduleHistory||[]),{from:t.scheduledDate||"",to:newDate,reason,by:currentUser.nome,date:getToday(),time:nowTime(),overdue:wasOverdue}];
    await db.collection(COLS.tasks).doc(id).update({scheduledDate:newDate,manualSchedule:true,status:"pending",rescheduleHistory:hist});
    log("status","Tarefa",{detail:t.title+" — "+reason,oldVal:t.scheduledDate?fmt(t.scheduledDate)+(wasOverdue?" (vencida)":""):"sem data",newVal:fmt(newDate)});
  };
  // Pausar tarefa iniciada (continuar depois)
  const pauseTask=async(id,newDate,reason)=>{
    const t=tasks.find(x=>x.id===id)||{};
    const hist=[...(t.rescheduleHistory||[]),{from:t.scheduledDate||"",to:newDate,reason,by:currentUser.nome,date:getToday(),time:nowTime(),paused:true}];
    await db.collection(COLS.tasks).doc(id).update({scheduledDate:newDate,manualSchedule:true,status:"pending",wasPaused:true,rescheduleHistory:hist});
    log("status","Tarefa",{detail:t.title+" — continuar depois: "+reason,oldVal:"Em andamento",newVal:"Reagendada p/ "+fmt(newDate)});
  };
  const delTask=async id=>{const t=tasks.find(x=>x.id===id);await db.collection(COLS.tasks).doc(id).delete();log("delete","Tarefa",{detail:t?.title});};
  const addPrev=async v=>{const id=uid();await db.collection(COLS.prevs).doc(id).set({...v,id,createdAt:getToday(),history:[],active:true});log("create","Preventiva",{detail:v.title});};
  const donePrev=async(id,i)=>{const td=getToday();const curr=prevs.find(x=>x.id===id)||{};const history=[...(curr.history||[]),{date:td,time:i.time,completedBy:i.responsible,note:i.note}];await db.collection(COLS.prevs).doc(id).update({history,lastDone:td,nextDate:nextOcc(curr.recurrence,td)});log("status","Preventiva",{detail:curr.title,newVal:"Realizada"});};
  const delPrev=async id=>{const p=prevs.find(x=>x.id===id);await db.collection(COLS.prevs).doc(id).delete();log("delete","Preventiva",{detail:p?.title});};
  const addImp=async v=>{const id=uid();await db.collection(COLS.imps).doc(id).set({...v,id,createdAt:getToday(),status:"pending"});log("create","Melhoria",{detail:v.title});};
  const impSt=async(id,s)=>{const im=imps.find(x=>x.id===id);await db.collection(COLS.imps).doc(id).update({status:s,completedAt:s==="done"?getToday():null});log("status","Melhoria",{detail:im?.title,newVal:s});};
  const delImp=async id=>{const im=imps.find(x=>x.id===id);await db.collection(COLS.imps).doc(id).delete();log("delete","Melhoria",{detail:im?.title});};
  const addCompra=async c=>{const id=c.id||uid();await db.collection(COLS.compras).doc(id).set({...c,id,createdBy:currentUser.nome});log("create","Compra",{detail:c.produto});};
  const updCompra=async(id,fields)=>{const c=compras.find(x=>x.id===id);if(fields._delete){await db.collection(COLS.compras).doc(id).delete();log("delete","Compra",{detail:c?.produto});}else{await db.collection(COLS.compras).doc(id).update(fields);if(fields.status&&fields.status!==c?.status)log("status","Compra",{detail:c?.produto,oldVal:SC[c?.status]?.lb||c?.status,newVal:SC[fields.status]?.lb||fields.status});else log("edit","Compra",{detail:c?.produto});}};
  const delCompra=async id=>{const c=compras.find(x=>x.id===id);await db.collection(COLS.compras).doc(id).delete();log("delete","Compra",{detail:c?.produto});};
  // Vincular compra existente a uma tarefa
  const linkExistingCompra=async(compraId,taskId)=>{
    const c=compras.find(x=>x.id===compraId);const t=tasks.find(x=>x.id===taskId);
    const ids=compraTaskIds(c);if(ids.includes(taskId))return;
    await db.collection(COLS.compras).doc(compraId).update({taskIds:[...ids,taskId],taskId:null});
    log("link","Compra↔Tarefa",{detail:`"${c?.produto}" vinculada a "${t?.title}"`});
    close();
  };
  const unlinkCompra=async(compraId,taskId)=>{
    const c=compras.find(x=>x.id===compraId);const t=tasks.find(x=>x.id===taskId);
    const ids=compraTaskIds(c).filter(x=>x!==taskId);
    await db.collection(COLS.compras).doc(compraId).update({taskIds:ids,taskId:null});
    log("link","Compra↔Tarefa",{detail:`"${c?.produto}" desvinculada de "${t?.title}"`});
  };

  const today=getToday();
  const planned=tasks.filter(t=>t.status==="pending"&&t.scheduledDate===today);
  const crit=tasks.filter(t=>t.status==="pending"&&t.deadline&&daysLeft(t.deadline)<=2&&!t.weekendOnly);
  const prevAlert=prevs.filter(p=>p.nextDate<=today&&p.active!==false).length;
  const pendC=compras.filter(c=>c.status==="pendente"||c.status==="aprovado"||c.status==="em_andamento").length;
  const critBadge=crit.filter(c=>!planned.find(p=>p.id===c.id)).length;

  // ── AUTH GATE ──
  if(!authReady)return<div style={{minHeight:"100dvh",background:DK,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{textAlign:"center"}}><div style={{fontSize:13,fontWeight:600,color:Y,letterSpacing:"0.15em",textTransform:"uppercase",marginBottom:6}}>FRISPAR — MANUTENÇÃO</div><div style={{color:"#94a3b8",fontSize:14}}>Carregando...</div></div></div>;
  if(!currentUser)return<LoginScreen users={users} onLogin={doLogin}/>;

  // ── PERMISSION-GATED TABS ──
  const allTabs=[
    {key:"dashboard",label:"Início",badge:0,show:true},
    {key:"today",label:"Hoje",badge:planned.length+critBadge,show:can(currentUser,"verTudo")},
    {key:"week",label:"Semana",badge:0,show:can(currentUser,"verTudo")},
    {key:"tasks",label:"Tarefas",badge:0,show:can(currentUser,"verTudo")},
    {key:"compras",label:"Compras",badge:pendC,show:true},
    {key:"rep",label:"Relatórios",badge:0,show:can(currentUser,"gerarRelatorios")},
    {key:"search",label:"Pesquisa",badge:0,show:can(currentUser,"verTudo")||can(currentUser,"gerarRelatorios")},
  ];
  const TABS=allTabs.filter(t=>t.show);
  const curTab=TABS.find(t=>t.key===tab)?tab:"dashboard";

  const tabSt=k=>({flex:1,minWidth:54,padding:"11px 4px",background:"none",border:"none",borderBottom:`2px solid ${curTab===k?Y:"transparent"}`,cursor:"pointer",fontWeight:600,fontSize:10,letterSpacing:"0.04em",textTransform:"uppercase",color:curTab===k?YD:T3,transition:"all 0.15s",display:"flex",flexDirection:"column",alignItems:"center",gap:3,fontFamily:"'Inter',sans-serif"});
  const rc=ROLES[currentUser.role]||{};

  return<div style={{minHeight:"100dvh",display:"flex",flexDirection:"column",background:BG}}>
    <header style={{background:DK,position:"sticky",top:0,zIndex:60,boxShadow:"0 2px 8px rgba(0,0,0,0.2)"}}>
      <div style={{maxWidth:960,margin:"0 auto",padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
        <div>
          <div style={{fontSize:11,fontWeight:600,color:Y,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:1}}>FRISPAR — MANUTENÇÃO</div>
          <div style={{fontWeight:700,fontSize:16,color:"#fff"}}>Sistema de Manutenção</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {can(currentUser,"verTudo")&&pendC>0&&<span style={{background:Y,color:DK,borderRadius:20,padding:"5px 12px",fontSize:12,fontWeight:700}} className="hide-mobile">{pendC} pendente{pendC>1?"s":""}</span>}
          {can(currentUser,"solicitarTarefa")&&<Btn onClick={()=>open("addTask")} v="y" style={{padding:"8px 12px",fontSize:12}}>+ Tarefa</Btn>}
          {can(currentUser,"criarAvulsa")&&<Btn onClick={()=>open("adhoc")} v="ghost" style={{padding:"7px 10px",fontSize:11,color:"#94a3b8",border:"1px solid #334155"}} className="hide-mobile">+ Avulsa</Btn>}
          {/* User menu */}
          <div style={{position:"relative"}}>
            <button onClick={()=>setModal(modal==="userMenu"?null:"userMenu")} style={{display:"flex",alignItems:"center",gap:8,background:"#1e293b",border:"1px solid #334155",borderRadius:20,padding:"5px 8px 5px 5px",cursor:"pointer"}}>
              <div style={{width:30,height:30,borderRadius:"50%",background:rc.color||T3,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:13}}>{currentUser.nome.charAt(0)}</div>
              <span style={{color:"#fff",fontSize:13,fontWeight:600}} className="hide-mobile">{currentUser.nome.split(" ")[0]}</span>
              <span style={{color:"#94a3b8",fontSize:10}}>▼</span>
            </button>
            {modal==="userMenu"&&<div style={{position:"absolute",top:"100%",right:0,marginTop:6,background:SF,borderRadius:12,boxShadow:"0 8px 30px rgba(0,0,0,0.2)",minWidth:200,overflow:"hidden",zIndex:100}}>
              <div style={{padding:"12px 16px",borderBottom:`1px solid ${B1}`}}>
                <div style={{fontSize:14,fontWeight:700,color:T1}}>{currentUser.nome}</div>
                <div style={{fontSize:12,color:rc.color}}>{rc.label}</div>
              </div>
              <button onClick={()=>{setModal("changePwd");}} style={{display:"block",width:"100%",textAlign:"left",padding:"11px 16px",background:"none",border:"none",cursor:"pointer",fontSize:13,color:T1,fontFamily:"'Inter',sans-serif"}}>Alterar minha senha</button>
              {can(currentUser,"gerirUsuarios")&&<button onClick={()=>{setModal("users");}} style={{display:"block",width:"100%",textAlign:"left",padding:"11px 16px",background:"none",border:"none",cursor:"pointer",fontSize:13,color:T1,fontFamily:"'Inter',sans-serif",borderTop:`1px solid ${B1}`}}>Gerenciar usuários</button>}
              {can(currentUser,"verLogs")&&<button onClick={()=>{setModal("logs");}} style={{display:"block",width:"100%",textAlign:"left",padding:"11px 16px",background:"none",border:"none",cursor:"pointer",fontSize:13,color:T1,fontFamily:"'Inter',sans-serif"}}>Logs de auditoria</button>}
              {can(currentUser,"gerarRelatorios")&&<button onClick={()=>{setModal("backup");}} style={{display:"block",width:"100%",textAlign:"left",padding:"11px 16px",background:"none",border:"none",cursor:"pointer",fontSize:13,color:T1,fontFamily:"'Inter',sans-serif",borderTop:`1px solid ${B1}`}}>Backup de dados</button>}
              <button onClick={()=>{close();doLogout();}} style={{display:"block",width:"100%",textAlign:"left",padding:"11px 16px",background:"none",border:"none",cursor:"pointer",fontSize:13,color:R,fontWeight:600,fontFamily:"'Inter',sans-serif",borderTop:`1px solid ${B1}`}}>Sair</button>
            </div>}
          </div>
        </div>
      </div>
      <nav style={{display:"flex",maxWidth:960,margin:"0 auto",borderTop:"1px solid #1e293b",overflowX:"auto"}} className="hide-mobile-nav">
        {TABS.map(t=><button key={t.key} style={{...tabSt(t.key),color:curTab===t.key?"#fff":T3,borderBottomColor:curTab===t.key?Y:"transparent"}} onClick={()=>setTab(t.key)}>{t.label}{t.badge>0&&<NBadge n={t.badge}/>}</button>)}
      </nav>
    </header>

    <main style={{maxWidth:960,margin:"0 auto",width:"100%",flex:1,padding:"18px 14px 84px"}} onClick={()=>modal==="userMenu"&&close()}>
      {curTab==="dashboard"&&<Dashboard tasks={tasks} compras={compras} prevs={prevs} user={currentUser} onOpen={open} onGoTab={setTab}/>}
      {curTab==="today"&&<TodayTab tasks={tasks} prevs={prevs} compras={compras} onOpen={open}/>}
      {curTab==="week"&&<WeekTab tasks={tasks} onOpen={open} onSchedOne={async(id,d)=>{await schedOne(id,d);}}/>}
      {curTab==="tasks"&&<TasksTab tasks={tasks} imps={imps} compras={compras} prevs={prevs} user={currentUser} onOpen={open} onSchedOne={async(id,d)=>{await schedOne(id,d);}} onDel={async id=>{await delTask(id);}} onImpSt={async(id,s)=>{await impSt(id,s);}} onDelImp={delImp} onPrevDone={async(id,i)=>{await donePrev(id,i);}} onPrevDel={async id=>{await delPrev(id);}}/>}
      {curTab==="compras"&&<ComprasTab compras={compras} tasks={tasks} user={currentUser} onOpen={open} onUpdate={async(id,f)=>{await updCompra(id,f);}}/>}
      {curTab==="rep"&&<ReportsTab tasks={tasks} compras={compras}/>}
      {curTab==="search"&&<SearchTab tasks={tasks} compras={compras} prevs={prevs} onOpen={open}/>}
    </main>

    <nav style={{position:"fixed",bottom:0,left:0,right:0,zIndex:100,background:SF,borderTop:`1px solid ${B1}`,display:"flex",boxShadow:"0 -1px 4px rgba(0,0,0,0.06)"}}>
      {TABS.map(t=><button key={t.key} onClick={()=>setTab(t.key)} style={tabSt(t.key)}>
        <span style={{position:"relative",display:"flex",alignItems:"center",justifyContent:"center",width:22,height:16}}>
          <span style={{width:6,height:6,borderRadius:"50%",background:curTab===t.key?Y:B2}}/>
          {t.badge>0&&<span style={{position:"absolute",top:-5,right:-8,background:Y,color:DK,borderRadius:8,minWidth:16,height:16,fontSize:10,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 3px"}}>{t.badge}</span>}
        </span>
        {t.label}
      </button>)}
    </nav>

    {modal==="addTask"    &&<TaskForm onClose={close} onSave={async v=>{await addTask(v);close();}}/>}
    {modal==="editTask"   &&<TaskForm onClose={close} initial={mdata} isEdit onSave={async v=>{await editTask(mdata.id,v);close();}}/>}
    {modal==="planWeek"   &&<WeekPlannerModal tasks={tasks} onClose={close} onAssign={async(ids,d)=>{await schedMany(ids,d);close();}}/>}
    {modal==="checkTask"  &&<CheckForm title={mdata?.title} onClose={close} onConfirm={async i=>{await doneTask(mdata.id,i);close();}}/>}
    {modal==="checkPrev"  &&<CheckForm title={mdata?.title} onClose={close} onConfirm={async i=>{await donePrev(mdata.id,i);close();}}/>}
    {modal==="addPrev"    &&<PrevForm onClose={close} onSave={async v=>{await addPrev(v);close();}}/>}
    {modal==="addImp"     &&<ImpForm onClose={close} onSave={async v=>{await addImp(v);close();}}/>}
    {modal==="adhoc"      &&<AdhocForm onClose={close} onSave={async v=>{await addAdhoc(v);close();}}/>}
    {modal==="addCompra"  &&<CompraForm onClose={close} tasks={tasks} onSave={async v=>{await addCompra(v);close();}}/>}
    {modal==="addCompraFor"&&<CompraForm onClose={close} tasks={tasks} initTaskId={mdata} onSave={async v=>{await addCompra(v);close();}}/>}
    {modal==="compraDetail"&&<CompraDetail c={mdata} tasks={tasks} user={currentUser} onClose={close} onUpdate={async(id,fields)=>{await updCompra(id,fields);close();}} onDelete={async()=>{await delCompra(mdata.id);close();}}/>}
    {modal==="detail"     &&<TaskDetail item={mdata} tasks={tasks} compras={compras} user={currentUser} onClose={close} onEdit={()=>open("editTask",mdata)} onDelete={async()=>{await delTask(mdata.id);close();}} onSched={async(id,d)=>{await schedOne(id,d);}} onDone={()=>open("checkTask",mdata)} onNewCompra={id=>open("addCompraFor",id)} onReschedule={async(id,d)=>{await schedOne(id,d);close();}} onPause={t=>open("pauseTask",t)} onResched={t=>open("reschedule",t)} onLinkExisting={t=>open("linkCompra",t)} onUnlink={async(cid,tid)=>{await unlinkCompra(cid,tid);}}/>}
    {modal==="linkCompra" &&<LinkCompraModal task={mdata} compras={compras} onClose={close} onLink={async(cid,tid)=>{await linkExistingCompra(cid,tid);}}/>}
    {modal==="reschedule" &&<RescheduleModal item={mdata} mode="reschedule" onClose={close} onConfirm={async(id,d,r)=>{await rescheduleTask(id,d,r);close();}}/>}
    {modal==="pauseTask"  &&<RescheduleModal item={mdata} mode="pause" onClose={close} onConfirm={async(id,d,r)=>{await pauseTask(id,d,r);close();}}/>}
    {modal==="backup"     &&<BackupModal tasks={tasks} prevs={prevs} imps={imps} compras={compras} onClose={close}/>}
    {modal==="users"      &&<UsersModal users={users} currentUser={currentUser} onClose={close} onAdd={addUser} onUpdate={updateUser} onDelete={deleteUser} onResetPwd={resetPwd}/>}
    {modal==="logs"       &&<LogsModal logs={logs} onClose={close}/>}
    {modal==="changePwd"  &&<ChangePwdModal user={currentUser} onSave={changePwd} onClose={close}/>}
    {modal==="forcePwd"   &&<ChangePwdModal user={currentUser} forced onSave={changePwd} onClose={()=>{}}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
